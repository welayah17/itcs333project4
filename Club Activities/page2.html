<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Club Activity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Campus Hub - Add Activity</header>

    <main>
        <form id="activityForm">
            <h2>Add New Club Activity</h2>
            <label>
                Title:
                <input type="text" id="title" required>
            </label><br>

            <label>
                Club:
                <select id="club" required>
                    <option value="">Select Club</option>
                    <option value="Photography Club">Photography Club</option>
                    <option value="Reading Club">Reading Club</option>
                    <option value="Spanish Club">Spanish Club</option>
                </select>
            </label><br>

            <label>
                Date:
                <input type="date" id="date" required>
            </label><br>

            <label>
                Description:
                <textarea id="description" required></textarea>
            </label><br>

            <button type="submit">Add Activity</button>
        </form>

        <div id="formMessage" style="margin-top: 10px;"></div>
    </main>

    <footer>Campus Hub &copy; 2025</footer>

    <script>
        const form = document.getElementById("activityForm");
        const message = document.getElementById("formMessage");

        form.addEventListener("submit", (e) => {
            e.preventDefault();

            const title = document.getElementById("title").value.trim();
            const club = document.getElementById("club").value;
            const date = document.getElementById("date").value;
            const description = document.getElementById("description").value.trim();

            if (!title || !club || !date || !description) {
                message.textContent = "Please fill out all fields.";
                message.style.color = "red";
                return;
            }

            const saved = localStorage.getItem("activities");
            const activities = saved ? JSON.parse(saved) : [];

            
            activities.push({ title, club, date, description });

        
            localStorage.setItem("activities", JSON.stringify(activities));

          
            message.textContent = "Activity added successfully!";
            message.style.color = "green";

           
            form.reset();

        
            setTimeout(() => {
                window.location.href = "page1.html";
            }, 1500);
        });
    </script>
</body>
</html>
