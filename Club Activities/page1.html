<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Campus Hub - Club Activities</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>Campus Hub</header>

    <nav>
        <ul>
            <li><a href="page2.html" class="add-group">+ Add Activity</a></li>
        </ul>
    </nav>

    <main>
        <h1>Club Activities</h1>

        <div class="search-filter">
            <input type="text" id="searchInput" placeholder="Search activities...">
            <select id="clubFilter">
                <option value="">All Clubs</option>
                <option value="Photography Club">Photography Club</option>
                <option value="Reading Club">Reading Club</option>
                <option value="Spanish Club">Spanish Club</option>
            </select>
            <select id="sortOption">
                <option value="">Sort By</option>
                <option value="date">Date</option>
                <option value="club">Club</option>
            </select>
        </div>

       
        <div id="activityList" class="group-list"></div>

       
        <div class="pag">
            <button id="prevPage">Previous</button>
            <button id="nextPage">Next</button>
        </div>

        
        <div id="loading" style="display: none;">Loading...</div>
        <div id="error" style="display: none; color: red;">Failed to load activities.</div>
    </main>

    <footer>Campus Hub &copy; 2025</footer>

    <script src="script.js"></script>
</body>
</html>
